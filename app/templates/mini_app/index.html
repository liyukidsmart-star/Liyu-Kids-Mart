<script>
let miniBootstrap=null;
let miniBootstrapPromise=null;
let sCache=new Map();
let sReqCtrl=null, sLoading=false, sHasMore=true, spg=1, scat='', ssort='best', sq='', sDbt=null, sObserver=null, sAll=[];

function loadMiniBootstrap(){
  if(miniBootstrap) return Promise.resolve(miniBootstrap);
  if(miniBootstrapPromise) return miniBootstrapPromise;
  miniBootstrapPromise = fetch('/api/v1/mini-app/bootstrap')
    .then(r=>r.json())
    .then(d=>{
      if(d.success){
        miniBootstrap = d.data || null;
        _cacheBootstrapShopPage(miniBootstrap);
        return miniBootstrap;
      }
      return null;
    })
    .catch(()=>null)
    .finally(()=>{ miniBootstrapPromise=null; });
  return miniBootstrapPromise;
}

function _cacheBootstrapShopPage(boot){
  if(!boot?.shop_page?.products) return;
  const page=boot.shop_page;
  const url='/api/v1/products?page=1&per_page=12&sort=bestselling&order=desc';
  sCache.set(url,{
    products: page.products,
    hasMore: !!page.has_more,
  });
}

function warmMiniApp(){
  loadMiniBootstrap().catch(()=>{});
}
async function loadHomeCats(){
  try{
    if(miniBootstrap?.categories){
      _renderHomeCategories(miniBootstrap.categories);
      return;
    }
    const boot=await loadMiniBootstrap();
    if(boot?.categories){
      _renderHomeCategories(boot.categories);
      return;
    }
    const d=await(await fetch('/api/v1/categories')).json();
    _renderHomeCategories(d.data||[]);
  }catch{
    _renderHomeCategories([]);
  }
}

/* ?????? Home: Sections ??????????????????????????????????????????????????????????????????????????????????????? */
async function loadHomeSections(){
  try{
    if(miniBootstrap){
      _renderHomeSections(miniBootstrap.featured||[], miniBootstrap.new_arrivals||[], miniBootstrap.best_sellers||[]);
      return;
    }
    const boot=await loadMiniBootstrap();
    if(boot){
      _renderHomeSections(boot.featured||[], boot.new_arrivals||[], boot.best_sellers||[]);
      return;
    }
    const [fr,nr,br]=await Promise.all([
      fetch('/api/v1/products?featured=true&per_page=8'),
      fetch('/api/v1/products?new_arrival=true&per_page=8'),
      fetch('/api/v1/products?sort=bestselling&per_page=6')]);
    const [fd,nd,bd]=await Promise.all([fr.json(),nr.json(),br.json()]);
    _renderHomeSections(fd.data?.products||[], nd.data?.products||[], bd.data?.products||[]);
  }catch{
    const feat=document.getElementById('featRow');
    if(feat) feat.innerHTML='<div class="empty"><p>Failed to load</p></div>';
  }
}

function ageFilter(btn,all=false){
  document.querySelectorAll('.achip').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(all||btn.dataset.mn==='-1'){loadHomeSections();return;}
  fetch('/api/v1/products?age_min='+btn.dataset.mn+'&age_max='+btn.dataset.mx+'&per_page=6')
    .then(r=>r.json()).then(d=>{
      const ps=d.data?.products||[];
      document.getElementById('homeGrid').innerHTML=ps.length?ps.map(p=>pcard(p)).join('')
        :'<div class="empty" style="grid-column:span 2"><div class="ei">🧩</div><p>No products for this age</p></div>';
    }).catch(()=>{});
}

/* ?? Shop tab ??????????????????????????????????? */
function setShopLoading(on){
  sLoading=on;
  const btn=document.getElementById('lmbtn');
  if(btn){
    btn.classList.toggle('loading', !!on);
    if(on){ 
      btn.style.opacity = '0.8';
      btn.innerHTML='<span class="spin" style="width:20px;height:20px;border-width:3px;border-color:rgba(255,255,255,0.3);border-top-color:#fff;display:inline-block;margin-right:8px;"></span> Loading...'; 
    } else {
      btn.style.opacity = '1';
      btn.innerHTML=tr('l_more');
    }
  }
}

function animateShopCards(nodes){
  nodes.forEach((el, i) => {
    el.classList.add('entering');
    el.style.animationDelay = (i * 40) + 'ms';
    setTimeout(() => el.classList.remove('entering'), 450);
  });
}

function setupShopObserver(){
  const sentinel = document.getElementById('shopSentinel');
  if(!sentinel || sObserver) return;
  sObserver = new IntersectionObserver(entries => {
    const entry = entries[0];
    if(entry && entry.isIntersecting && sHasMore && !sLoading){
      loadMore();
    }
  }, { root: null, rootMargin: '320px 0px', threshold: 0.01 });
  sObserver.observe(sentinel);
}

async function loadShop(reset=false){
  if(sLoading && !reset) return;
  if(reset){spg=1;sAll=[];}
  const grid=document.getElementById('shopGrid');
  if(reset)grid.innerHTML='<div class="ldr" style="grid-column:span 2"><div class="spin"></div></div>';
  const isSearchMode=Boolean(sq && sq.length>=2);
  let url=isSearchMode?('/api/v1/products/search?q='+encodeURIComponent(sq)+'&limit=24'):'/api/v1/products?page='+spg+'&per_page=12';
  if(!isSearchMode){
    if(scat)url+='&category_id='+scat;
    if(ssort==='new')url+='&sort=created_at&order=desc';
    else if(ssort==='asc')url+='&sort=price&order=asc';
    else if(ssort==='desc')url+='&sort=price&order=desc';
    else url+='&sort=bestselling&order=desc';
  }

  if(reset && sCache.has(url)){
    const cached=sCache.get(url);
    sAll=[...cached.products]; sHasMore=cached.hasMore;
    grid.innerHTML=sAll.length?sAll.map(p=>pcard(p)).join(''):'<div class="empty" style="grid-column:span 2"><div class="ei">🧸</div><p>No products found</p></div>';
    document.getElementById('lmbtn').style.display=sHasMore?'block':'none';
    setupShopObserver();
    return;
  }

  if(sReqCtrl) sReqCtrl.abort();
  sReqCtrl=new AbortController();
  setShopLoading(true);
  try{
    const d=await(await fetch(url,{signal:sReqCtrl.signal})).json();
    const ps=d.data?.products||[];
    const tot=d.data?.total||0;
    sAll=reset?[...ps]:[...sAll,...ps];
    sHasMore=!isSearchMode && sAll.length<tot;
    if(reset)grid.innerHTML=sAll.length?sAll.map(p=>pcard(p)).join('')
      :'<div class="empty" style="grid-column:span 2"><div class="ei">🧸</div><p>No products found</p></div>';
    else {
      const before=grid.children.length;
      ps.forEach(p=>grid.insertAdjacentHTML('beforeend',pcard(p)));
      animateShopCards(Array.from(grid.children).slice(before));
    }
    if(reset) sCache.set(url,{products:sAll,hasMore:sHasMore});
    document.getElementById('lmbtn').style.display=sHasMore?'block':'none';
    setupShopObserver();
  }catch(err){if(err?.name==='AbortError') return; if(reset)grid.innerHTML='<div class="empty" style="grid-column:span 2"><p>Failed to load</p></div>';}
  finally{if(sReqCtrl && !sReqCtrl.signal.aborted) sReqCtrl=null; setShopLoading(false);}
}
function loadMore(){if(!sLoading&&sHasMore){spg++;loadShop(false);}}
function shopCat(id,btn){
  scat=id;
  document.querySelectorAll('#shopCats .chip').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  loadShop(true);
}
function shopSort(s,btn){
  ssort=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  loadShop(true);
}
function shopSearch(val){
  sq=val.trim();
  document.getElementById('sclr').classList.toggle('on',sq.length>0);
  clearTimeout(sDbt);sDbt=setTimeout(()=>loadShop(true),220);
}
function shopClear(){
  document.getElementById('shopSrch').value='';sq='';
  document.getElementById('sclr').classList.remove('on');loadShop(true);
}

/* ── Init ─────────────────────────────────────── */
async function init(){
  if(TGU?.first_name)document.getElementById('hname').textContent=TGU.first_name;
  updBdg();
  await auth();
  try{
    const launchRes = await fetch('/api/v1/shop/init');
    const launchData = await launchRes.json();
    if(launchData.success){
      applyLaunchState(launchData.data);
      applyMiniAppVisibility(launchData.data);
    }
  }catch{}
  // Load loyalty profile early so product cards can use it and global bar can render
  const profUrl = TGID ? '/api/v1/loyalty/profile?telegram_id='+TGID : '/api/v1/loyalty/profile';
  fetch(profUrl)
    .then(r=>r.json()).then(d=>{
      if(d.success){
        loyaltyProfile=d.data;
        updateGlobalLoyaltyBar();
      }
    }).catch(()=>{});

  const intent = getStartupIntent();
  if(intent.productId){
    const handled = await openStartParamTarget(intent);
    setTimeout(() => warmMiniApp(), handled ? 300 : 0);
    return;
  }

  setTimeout(() => warmMiniApp(), 0);
  await openStartParamTarget(intent);
}

function renderCart(){

function cqty(idx,d){cart[idx].qty=Math.max(1,cart[idx].qty+d);saveCart();_discountCache=null;renderCart();fetchDiscountFromServer().then(()=>{renderCart();updateGlobalLoyaltyBar();});}
function crm(idx){const n=cart[idx].name.slice(0,22);cart.splice(idx,1);saveCart();_discountCache=null;renderCart();toast('🗑 '+n+'… removed');}

/* ── Smart Cart Incentives ─────────────────────── */
let _loyIncentiveCache=null, _loyThreshCache=null;
let _discountCache=null; // Server-authoritative discount data

async function fetchDiscountFromServer(){
  // Calls the backend which reads admin-configured thresholds from DB
  // Picks best between loyalty tier discount and spending threshold
  const st = sub();
  // Send each unit's price as a flat list so the backend can apply the min-price
  // threshold itself — avoids any frontend race condition with loyaltyProfile loading.
  const priceList = cart.flatMap(i => Array(i.qty).fill(i.price)).join(',');
  try {
    const params = new URLSearchParams({subtotal: st});
    if (priceList) params.set('prices', priceList);
    if (TGID) params.set('telegram_id', TGID);
    const r = await fetch('/api/v1/loyalty/discount?' + params.toString());
    const d = await r.json();
    if (d.success) {
      const data = d.data;
      // Normalize into the shape calcClientDiscount() returns
      _discountCache = {
        loyaltyDiscAmt: Math.round(data.loyalty_discount_amount || 0),
        loyaltyLabel: data.savings_breakdown?.find(s=>s.label?.includes('Loyalty'))?.label || 'Loyalty Discount',
        threshDiscAmt: Math.round(data.spending_discount_amount || 0),
        threshLabel: data.savings_breakdown?.find(s=>s.label?.includes('Large'))?.label || 'Purchase Discount',
        qtyDiscAmt: Math.round(data.qty_discount_amount || 0),
        qtyLabel: data.savings_breakdown?.find(s=>s.label?.includes('Items'))?.label || 'Quantity Discount',
        incentiveDiscAmt: 0, // handled separately via cart incentive API
        incentiveLabel: 'Cart Reward',
        total_discount_amount: Math.round(data.total_discount_amount || 0),
        total: Math.round(data.total_discount_amount || 0),
        raw: data,
      };
    }
  } catch(e) { console.warn('fetchDiscountFromServer failed:', e); }
  // Also refresh cart incentive context
  try {
    const incR = await fetch('/api/v1/loyalty/cart-incentive?subtotal=' + st);
    const incD = await incR.json();
    if(incD.success) {
      _loyIncentiveCache = incD.data;
      // Only apply incentive savings if the server says the user's tier is eligible.
      // incentive_allowed comes from the /loyalty/discount response (raw.incentive_allowed).
      const incentiveEligible = _discountCache?.raw?.incentive_allowed === true;
      if(_discountCache && incentiveEligible && _loyIncentiveCache?.current_savings > 0){
        _discountCache.incentiveDiscAmt = Math.round(_loyIncentiveCache.current_savings);
        _discountCache.total += _discountCache.incentiveDiscAmt;
        _discountCache.total_discount_amount += _discountCache.incentiveDiscAmt;
      }
    }
  } catch{}
}

async function fetchLoyaltyCartContext(subtotal){
  // Fetch both: cart incentive and spending threshold in parallel
  try{
    const [incR, profR] = await Promise.all([
      fetch('/api/v1/loyalty/cart-incentive?subtotal='+subtotal),
      TGID?fetch('/api/v1/loyalty/profile?telegram_id='+TGID):Promise.resolve(null)
    ]);
    const incD = await incR.json();
    const profD = profR ? await profR.json() : null;
    if(incD.success) _loyIncentiveCache = incD.data;
    if(profD?.success) { loyaltyProfile = profD.data; _loyThreshCache = profD.data?.discount_preview; }
  } catch{}
}

function getSpendingThresholdProgress(st) {
  const thresholds = loyaltyProfile?.spending_thresholds || [];
  let curThresh = null;
  let nextThresh = null;
  
  for (let t of thresholds) {
    if (st >= t.min_amount) {
      curThresh = t;
    } else {
      nextThresh = t;
      break;
    }
  }
  
  if (!nextThresh) {
    return { curThresh, nextThresh: null, needed: 0, pct: 100, potSavings: 0 };
  }
  const needed = nextThresh.min_amount - st;
  const pct = Math.min(100, Math.max(0, (st / nextThresh.min_amount) * 100));
  const potSavings = Math.round(nextThresh.min_amount * nextThresh.discount_percentage / 100);
  return { curThresh, nextThresh, needed, pct, potSavings };
}

async function renderCartLoyaltyBanner(subtotal){
  await fetchLoyaltyCartContext(subtotal);

  const prog = getSpendingThresholdProgress(subtotal);
  
  let suggestHTML = '';

      suggestHTML = `<div class="loy-suggest-label">\ud83d\udecd\ufe0f ${curLang==='am'?'ቅናሹን ለማግኘት እነዚህን ይጨምሩ':'Add to unlock'}:</div>

            </div>
            <button class="loy-suggest-btn" onclick="addCart(${p.id},'${esc(p.name)}',${p.price},'${p.primary_image}');renderCart()">+ ${curLang==='am'?'ጨምር':'Add'}</button>
          </div>`;}).join('')}</div>`;
    }
  }

  // Loyal customer tier discount (takes precedence if higher than threshold)
  const userIsLoyalTier = loyaltyProfile?.level && (loyaltyProfile.level.sort_order||0) > 0;
  const tierPct = loyaltyProfile?.level?.discount_percentage || 0;
  
  let tierBannerHTML = '';
  if(userIsLoyalTier && tierPct > 0 && tierPct >= (prog.nextThresh?.discount_percentage||0)){
    const discAmt = Math.round(subtotal * tierPct / 100);
    tierBannerHTML = `<div class="loy-cart-banner both">
      <div class="loy-banner-top">
        <div class="loy-banner-ico">${loyaltyProfile.level.badge_icon||'\ud83d\udc51'}</div>
        <div class="loy-banner-text">
          <div class="loy-banner-title">${loyaltyProfile.level.name} ${curLang==='am'?'ቅናሽ':'discount'}: ${curLang==='am'?'ETB '+discAmt.toLocaleString()+' ቀንሷል!':'Save ETB '+discAmt.toLocaleString()+'!'}</div>
          <div class="loy-banner-sub">${tierPct}% ${curLang==='am'?'የታማኝነት ሽልማት \u2014 በክፍያ ጊዜ ይቀነሳል':'loyalty reward \u2014 applied at checkout'}</div>
        </div>
      </div>
    </div>`;
    return tierBannerHTML; // Skip thresholds if loyalty tier is already better than what they can unlock
  }

  // Otherwise show spending threshold progress
  let bannerHTML = '';
  if(prog.nextThresh && prog.needed > 0){
    bannerHTML = `<div class="loy-cart-banner thresh">
      <div class="loy-banner-top">

async function renderQtyIncentiveBanner() {
  if(isLaunchLocked || !_discountCache) return '';
  const raw = _discountCache.raw || {};
  const qtyMinPrice = raw.qty_min_price || 2500;
  const qtyEligItems = raw.qty_eligible_items || 0;
  const qtyAllowed = raw.qty_allowed !== false; // open to all by default
  if(!qtyAllowed) return '';

  // Build from server data
  const nextTierAmt = raw.next_qty_tier_amount || 0;
  const nextTierItems = raw.next_qty_tier_items || 0;
  const currentSavings = Math.round(_discountCache.qtyDiscAmt || 0);

  // Generate message based on eligible items
  let msg = '';
  let itemsNeeded = 0;
  if(_discountCache.qtyDiscAmt > 0) {
    msg = `🏆 Multi-buy reward active! You're saving ETB ${currentSavings.toLocaleString()}`;
  } else if(qtyEligItems === 0) {
    msg = curLang==='am'
      ? `📦 ETB ${Math.round(qtyMinPrice).toLocaleString()}+ ዋጋ ያላቸው ምርቶችን ይጨምሩ — ብዙ ቅናሽ ያግኙ!`
      : `📦 Add products priced ETB ${Math.round(qtyMinPrice).toLocaleString()}+ to unlock multi-buy discounts!`;
  } else {
    // Find next qty tier from the server-cached profile
    const qtyRules = loyaltyProfile?.qty_discounts || [];
    let nextRule = null;
    for(const r of qtyRules) {
      if(r.min_items > qtyEligItems) { nextRule = r; break; }
    }
    if(nextRule) {
      itemsNeeded = nextRule.min_items - qtyEligItems;
      const savingAmt = Math.round(nextRule.discount_amount);
      msg = itemsNeeded === 1
        ? `🛍️ Add just 1 more eligible item → unlock ETB ${savingAmt.toLocaleString()} off!`
        : `🛍️ Add ${itemsNeeded} more eligible items → unlock ETB ${savingAmt.toLocaleString()} off!`;
    } else {
      msg = `🏆 Maximum multi-buy tier unlocked!`;
    }
  }

  if(!msg) return '';
  const isActive = _discountCache.qtyDiscAmt > 0;
  return `<div class="loy-cart-banner" style="background:linear-gradient(135deg,${isActive?'#065F46,#059669':'#1E3A5F,#2563EB'});color:#fff;margin:6px 14px 0;border-radius:14px;padding:12px 14px;font-size:.85rem;display:flex;align-items:center;gap:10px;">
    <span style="font-size:1.4rem;">${isActive?'🏆':'📦'}</span>
    <span style="font-weight:600;line-height:1.4;">${msg}</span>
  </div>`;
}

/* ── Cart Popup & Discount Calculation ─────────── */
function calcClientDiscount() {
  // Uses server-fetched data if available (most accurate)
  // Falls back to local calculation if cache is empty
  if (_discountCache) {
    return _discountCache;
  }
  // Fallback: local estimate using cached loyalty profile
  const st = sub();
  let loyaltyDiscAmt = 0, loyaltyLabel = '';
  let threshDiscAmt = 0, threshLabel = '';
  let incentiveDiscAmt = 0, incentiveLabel = '';
  let qtyDiscAmt = 0, qtyLabel = '';

  // Determine user tier level (0 = guest, 1 = Bronze, 2 = Silver, 3 = Gold, 4+ = higher)
  const tierSortOrder = loyaltyProfile?.level?.sort_order || 0;
  // qty discounts: default open to all unless server says otherwise
  const qtyAllowed = _discountCache?.raw?.qty_allowed !== false ? true : (tierSortOrder >= 1);
  const incentiveAllowed = tierSortOrder >= 3; // Gold and above

  if (loyaltyProfile?.level?.discount_percentage > 0) {
    const pct = loyaltyProfile.level.discount_percentage;
    loyaltyDiscAmt = Math.round(st * pct / 100);
    loyaltyLabel = loyaltyProfile.level.name + ' Loyalty (' + pct + '%)';
  }

  const thresholds = loyaltyProfile?.spending_thresholds || [];
  for (let i = thresholds.length - 1; i >= 0; i--) {
    if (st >= thresholds[i].min_amount) {
      const potential = Math.round(st * thresholds[i].discount_percentage / 100);
      if (potential > loyaltyDiscAmt) {
        threshDiscAmt = potential;
        loyaltyDiscAmt = 0;
        threshLabel = 'Large Purchase Discount (' + thresholds[i].discount_percentage + '%)';
      }
      break;
    }
  }

  // Cart incentive — only for Gold+ (sort_order >= 3)
  if (incentiveAllowed) {
    const inc = _loyIncentiveCache;
    if (inc?.current_savings > 0) {
      incentiveDiscAmt = Math.round(inc.current_savings);
      incentiveLabel = 'Cart Reward';
    }
  }

  // Quantity discount — only for Bronze+ (sort_order >= 1)
  // Server-calculated; client shows 0 unless we got it from server cache already
  // (Qty discount requires server knowledge of rules, we don't duplicate that logic here)

  const total = loyaltyDiscAmt + threshDiscAmt + incentiveDiscAmt + qtyDiscAmt;
  return { loyaltyDiscAmt, loyaltyLabel, threshDiscAmt, threshLabel, incentiveDiscAmt, incentiveLabel, qtyDiscAmt, qtyLabel, total, qtyAllowed, incentiveAllowed, tierSortOrder };
}

const CK_STORE_LAT=8.956133150795546, CK_STORE_LNG=38.78781484232836;

function ckFetchRoute(toLat,toLng){
  return fetch(`https://router.project-osrm.org/route/v1/driving/${CK_STORE_LNG},${CK_STORE_LAT};${toLng},${toLat}?overview=full&geometries=geojson`)
    .then(r=>r.json()).then(d=>{
      if(d.routes&&d.routes.length)return{coords:d.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]),distKm:(d.routes[0].distance/1000).toFixed(1),durMin:Math.round(d.routes[0].duration/60)};
      return null;
    }).catch(()=>null);
}

async function ckUpdateLocation(lat,lng){
  ckLat=lat; ckLng=lng;
  const feeCard=document.getElementById('ckFeeCard');
  const fcVal=document.getElementById('ckFcVal');
  const fcSub=document.getElementById('ckFcSub');
  const fcIco=document.getElementById('ckFcIco');
  const fcDistWrap=document.getElementById('ckFcDistWrap');
  const fcDist=document.getElementById('ckFcDist');
  const proceedBtn=document.getElementById('proceedBtn');
  if(!feeCard)return;
  feeCard.className='ck-fee-card';
  fcIco.innerHTML='<div class="cfc-spin"></div>';
  fcVal.textContent='Calculating…';
  fcSub.textContent='Fetching route & price';
  fcDistWrap.style.display='none';
  if(proceedBtn){proceedBtn.disabled=true;proceedBtn.innerHTML='<i class="fas fa-spinner fa-spin"></i>';}

  const routeData = await ckFetchRoute(lat,lng);
  let calcBody = {lat, lng};
  if(routeData && routeData.distKm) {
    calcBody.distance_km = parseFloat(routeData.distKm);
  }

  const priceResp = await fetch('/api/v1/delivery/calculate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(calcBody)
  }).then(r=>r.json()).catch(()=>({success:false}));

  if(ckMap&&routeData){
    if(ckRoute)ckMap.removeLayer(ckRoute);
    ckRoute=L.polyline(routeData.coords,{color:'#2D6A4F',weight:5,opacity:.8,lineCap:'round',lineJoin:'round'}).addTo(ckMap);
    ckMap.fitBounds(ckRoute.getBounds(),{padding:[50,50]});
    fcDistWrap.style.display='block';
    fcDist.textContent=routeData.distKm+' km';
  } else if (ckMap&&ckRoute) {
    ckMap.removeLayer(ckRoute);
  }

  if(priceResp.success){
    const price=priceResp.data.price;
    ckDeliveryFee=price;
    feeCard.className='ck-fee-card';
    fcIco.textContent='🛵';
    fcVal.textContent='ETB '+price.toFixed(0);
    fcSub.textContent=routeData?`~${routeData.durMin} min estimated delivery`:`${priceResp.data.distance_km} km from store`;
    if(proceedBtn){proceedBtn.disabled=false;proceedBtn.innerHTML=`Proceed <i class="fas fa-arrow-right"></i>`;}
  } else {
    ckDeliveryFee=80; // Default flat rate if calculation fails
    feeCard.className='ck-fee-card error';
    fcIco.textContent='🛵';
    fcVal.textContent='ETB 80';
    fcSub.textContent='Standard Delivery Fee';
    if(proceedBtn){proceedBtn.disabled=false;proceedBtn.innerHTML=`Proceed <i class="fas fa-arrow-right"></i>`;}
  }
}

function ckSetPin(latlng){
  if(!ckMap)return;
  if(ckMarker){ckMarker.setLatLng(latlng);}else{
    const pinIcon=L.divIcon({className:'',html:'<div class="ck-pin-wrap"><div class="ck-pin"></div></div>',iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-28]});
    ckMarker=L.marker(latlng,{icon:pinIcon,draggable:true}).addTo(ckMap);
    ckMarker.on('dragend',e=>{const p=e.target.getLatLng();ckUpdateLocation(p.lat,p.lng);});
  }
  const hint=document.getElementById('ckHint');
  if(hint)hint.classList.add('hidden');
  ckUpdateLocation(latlng.lat,latlng.lng);
}

function getDistFromStore(lat,lon){
  const R=6371;const dLat=(lat-CK_STORE_LAT)*Math.PI/180;const dLon=(lon-CK_STORE_LNG)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(CK_STORE_LAT*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* ── TeleBirr receipt upload ───────────────────────── */
let tbReceiptUrl = '';
let tbUploading = false;

async function handleReceiptUpload(input){
  const file = input.files[0];
  if(!file) return;
  const preview = document.getElementById('receiptPreview');
  const status  = document.getElementById('receiptStatus');
  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:160px;border-radius:8px;object-fit:contain"/>`;
  };
  reader.readAsDataURL(file);
  // Upload to backend
  if(tbUploading) return;
  tbUploading = true;
  if(status) status.innerHTML = `<span style="color:#F59E0B">${tr('p_tb_uploading')}</span>`;
  try{
    const fd = new FormData();
    fd.append('receipt', file);
    if(TGID) fd.append('telegram_id', TGID);
    const r = await fetch('/api/v1/mini-app/upload-receipt', {method:'POST', body:fd});
    const d = await r.json();
    if(d.success && d.data?.receipt_url){
      tbReceiptUrl = d.data.receipt_url;
      if(status) status.innerHTML = `<span style="color:#059669;font-weight:700">${tr('p_tb_done')}</span>`;
    } else {
      if(status) status.innerHTML = `<span style="color:#DC2626">${curLang==='am'?'ስዕሉን መጫን አልተሳካም':'Upload failed — please retry'}</span>`;
      tbReceiptUrl = '';
    }
  } catch {
    if(status) status.innerHTML = `<span style="color:#DC2626">${curLang==='am'?'ኔትወርክ ችግር ነው':'Network error during upload'}</span>`;
    tbReceiptUrl = '';
  }
  tbUploading = false;
}

async function placeOrder(){
  if(launchGuard()) return;
  if(placing)return;
  const cn=window.ckFormData.cn;
  const cp=window.ckFormData.cp;
  const cl=window.ckFormData.cl;
  const cno=window.ckFormData.cno;
  if(!ckLat||!ckLng){toast(tr(curLang==='am'?'ck_pin_first':'ck_pin_first'),'err');return;}
  // Require TeleBirr receipt
  if(selPM==='telebirr' && !tbReceiptUrl){
    toast(tr('p_tb_required'),'err');
    return;
  }
  placing=true;
  const btn=document.getElementById('placeBtn');
  if(btn){btn.disabled=true;btn.innerHTML=`<i class="fas fa-spinner fa-spin"></i> ${tr('plc_placing')}`;}
  try{
    const discParams = calcClientDiscount();
    const r=await fetch('/api/v1/mini-app/checkout',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        telegram_id:TGID,
        full_name:TGU?((TGU.first_name||'')+' '+(TGU.last_name||'')).trim():cn,
        telegram_username:TGU?.username||'',
        cart_items:cart.map(i=>({id:i.id,qty:i.qty})),
        delivery:{name:cn,phone:cp,sub_city:'',specific_location:cl,city:'Addis Ababa',lat:ckLat,lng:ckLng,delivery_fee:ckDeliveryFee},
        payment_method:selPM,
        payment_receipt_url:tbReceiptUrl||'',
        loyalty_discount_amount: discParams.loyaltyDiscAmt,
        spending_discount_amount: discParams.threshDiscAmt,
        cart_incentive_discount: discParams.incentiveDiscAmt,
        total_discount_amount: discParams.total,
        notes:cno||'Placed via Telegram Mini App'
      })});
    const d=await r.json();
    if(d.success){
      localStorage.setItem('lkm_cn', cn);
      localStorage.setItem('lkm_cp', cp);
      localStorage.setItem('lkm_cl', cl);
      tbReceiptUrl = '';
      lastON=d.data?.order_number||'LKM-0001';
      cart=[];saveCart();ckStep='success';renderCK();
      try{tg?.HapticFeedback?.notificationOccurred('success');}catch{}
    }else{
      toast(d.message||(curLang==='am'?'ትዕዛዝ መላክ አልተሳካም። እባክዎ እንደገና ይሞክሩ።':'Order failed. Please try again.'),'err');
      if(btn){btn.disabled=false;btn.innerHTML=`<i class="fas fa-check-circle"></i> ${tr('plc_btn')}`;}
    }
  }catch{
    toast(curLang==='am'?'የኔትወርክ ችግር ተፈጥሯል። እባክዎ እንደገና ይሞክሩ።':'Network error. Please try again.','err');
    if(btn){btn.disabled=false;btn.innerHTML=`<i class="fas fa-check-circle"></i> ${tr('plc_btn')}`;}
  }
  placing=false;
}

    if(!window.L) await new Promise(r=>{const s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=r;document.head.appendChild(s);});
    
    setTimeout(()=>{
      trackMap=L.map('trackMap',{zoomControl:false,attributionControl:false}).setView([CK_STORE_LAT,CK_STORE_LNG],14);
      L.control.zoom({position:'topleft'}).addTo(trackMap);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,subdomains:'abcd'}).addTo(trackMap);
    },100);
  }
  
  document.getElementById('trackModal').style.display='flex';
  document.getElementById('trackOrderNum').textContent=orderNumber;
  startTrackPolling(orderNumber);
}

async function startTrackPolling(orderNumber){
  if(trackInterval)clearInterval(trackInterval);
  async function poll(){
    try{
      const d=await(await fetch('/api/v1/track/'+orderNumber)).json();
      if(!d.success||!trackMap)return;
      const td=d.data;
      const dLat=td.driver_lat, dLng=td.driver_lng;
      const destLat=td.delivery_lat, destLng=td.delivery_lng;
      
      if(destLat&&destLng&&!trackDestMarker){
        trackDestMarker=L.marker([destLat,destLng],{icon:L.divIcon({className:'',html:'<div style="background:var(--g,#00C853);border:3px solid #fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:.8rem;box-shadow:0 2px 8px rgba(0,0,0,.4)">📍</div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(trackMap);
      }
      
      if(dLat&&dLng){
        if(!trackDriverMarker){
          trackDriverMarker=L.marker([dLat,dLng],{icon:L.divIcon({className:'',html:'<div style="background:#FF8C42;border:3px solid #fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:pulse 2s infinite">🛵</div>',iconSize:[36,36],iconAnchor:[18,18]})}).addTo(trackMap);
          trackMap.setView([dLat,dLng],15,{animate:true});
        } else {
          trackDriverMarker.setLatLng([dLat,dLng]);
        }
      }
    }catch(e){}
  }
  poll();
  trackInterval=setInterval(poll,5000);
}

function closeTrackModal(){
  if(trackInterval){clearInterval(trackInterval);trackInterval=null;}
  if(trackMap){trackMap.remove();trackMap=null;trackDriverMarker=null;trackDestMarker=null;}
  const m=document.getElementById('trackModal');
  if(m)m.style.display='none';
}

}
