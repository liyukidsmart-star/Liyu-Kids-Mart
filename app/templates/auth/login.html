{% extends 'base.html' %}
{% block title %}Login — Liyu Kids Mart{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="brand-icon fs-2">🌿</span>
      <h2>Welcome Back</h2>
      <p class="text-muted">Sign in to your Liyu Kids Mart account</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control lkm-input" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="passwordInput" class="form-control lkm-input" placeholder="••••••••" required/>
          <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
      </div>
      <button type="submit" class="btn lkm-btn-green w-100 btn-lg mt-2">
        <i class="fas fa-sign-in-alt me-2"></i>Sign In
      </button>
    </form>
    <hr class="my-4"/>
    <p class="text-center text-muted small">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-green fw-600">Create one free</a></p>
    <div class="text-center mt-2">
      <a href="https://t.me/LiyuKidsBot" target="_blank" class="btn btn-outline-secondary w-100">
        <i class="fab fa-telegram me-2"></i>Continue with Telegram Bot
      </a>
    </div>
  </div>
</div>
<script>
function togglePwd() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}
</script>
{% endblock %}
